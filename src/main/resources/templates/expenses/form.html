<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${isEdit} ? 'Edit Expense' : 'Add Expense'">Expense Form</title>
    <th:block layout:fragment="head-extra">
        <style>
            /* Mic button while recording — red pulse */
            .tmf-mic-recording {
                color: #fff !important;
                background-color: #dc3545 !important;
                border-color: #dc3545 !important;
                animation: tmfMicPulse 1s ease-in-out infinite;
            }
            @keyframes tmfMicPulse {
                0%, 100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, .55); }
                50%      { box-shadow: 0 0 0 .35rem rgba(220, 53, 69, 0); }
            }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">

    <!-- ── Page header ── -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/expenses}" class="btn btn-sm btn-outline-secondary d-inline-flex align-items-center gap-1">
            <i class="bi bi-arrow-left"></i>Back
        </a>
        <div>
            <h4 class="fw-bold mb-0" th:text="${isEdit} ? 'Edit Expense' : 'Add Expense'">Expense Form</h4>
            <small class="text-muted"
                   th:text="${isEdit} ? 'Update the details below and save.' : 'Fill in the details below to record a new expense.'">
            </small>
        </div>
    </div>

    <!-- ── Natural-language quick entry (only on the create form) ── -->
    <div class="row justify-content-center" th:if="${not isEdit}">
        <div class="col-12 col-lg-9 col-xl-8">
            <div class="card shadow-sm border-0 mb-3">
                <div class="card-body p-4">
                    <label class="form-label fw-semibold d-flex align-items-center gap-2 mb-2">
                        <i class="bi bi-stars text-primary"></i>Quick entry with AI
                    </label>
                    <div class="input-group">
                        <input type="text"
                               id="nlInput"
                               class="form-control"
                               placeholder="e.g. spent 200 on metro yesterday"
                               autocomplete="off">
                        <button type="button" id="nlMicBtn"
                                class="btn btn-outline-secondary"
                                title="Speak your expense"
                                aria-label="Start voice input"
                                aria-pressed="false">
                            <i class="bi bi-mic-fill"></i>
                        </button>
                        <button type="button" id="nlParseBtn" class="btn btn-primary">
                            <span id="nlParseLabel">
                                <i class="bi bi-magic me-1"></i>Parse with AI
                            </span>
                            <span id="nlParseSpinner" class="d-none">
                                <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                Parsing…
                            </span>
                        </button>
                    </div>

                    <!-- Voice status row -->
                    <div id="nlListeningText"
                         class="small text-danger fw-semibold mt-2 d-none d-flex align-items-center gap-1">
                        <i class="bi bi-record-fill"></i>Listening…
                    </div>
                    <div id="nlVoiceUnsupported"
                         class="small text-muted mt-2 d-none"
                         data-bs-toggle="tooltip"
                         title="The Web Speech API is only available in Chromium-based browsers.">
                        <i class="bi bi-info-circle me-1"></i>Voice input requires Chrome or Edge
                    </div>

                    <!-- Result banners (hidden by default; toggled by JS) -->
                    <div id="nlSuccessBanner"
                         class="alert alert-success d-none align-items-center gap-2 mt-3 mb-0"
                         role="alert">
                        <i class="bi bi-check-circle-fill flex-shrink-0"></i>
                        <span>Form filled by AI — please verify before saving.</span>
                    </div>
                    <div id="nlErrorBanner"
                         class="alert alert-danger d-none align-items-center gap-2 mt-3 mb-0"
                         role="alert">
                        <i class="bi bi-exclamation-octagon-fill flex-shrink-0"></i>
                        <span>Could not parse. Please fill manually.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Form card ── -->
    <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">

                    <form th:action="${isEdit} ? @{/expenses/{id}(id=${expenseId})} : @{/expenses}"
                          method="post"
                          th:object="${expense}"
                          novalidate
                          autocomplete="off">

                        <!-- ▸ Title ───────────────────────────────────── -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold" for="title">
                                Title <span class="text-danger" aria-hidden="true">*</span>
                            </label>
                            <input type="text"
                                   th:field="*{title}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                                   placeholder="e.g. Groceries at BigBazaar"
                                   maxlength="150">
                            <div class="invalid-feedback" th:errors="*{title}">Title error</div>
                        </div>

                        <!-- ▸ Amount + Date ────────────────────────────── -->
                        <div class="row g-3 mb-4">

                            <div class="col-md-6">
                                <label class="form-label fw-semibold" for="amount">
                                    Amount <span class="text-danger" aria-hidden="true">*</span>
                                </label>
                                <div class="input-group"
                                     th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'">
                                    <span class="input-group-text fw-semibold">₹</span>
                                    <input type="number"
                                           th:field="*{amount}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'"
                                           step="0.01"
                                           min="0.01"
                                           placeholder="0.00">
                                </div>
                                <div class="invalid-feedback d-block"
                                     th:if="${#fields.hasErrors('amount')}"
                                     th:errors="*{amount}">Amount error</div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold" for="date">
                                    Date <span class="text-danger" aria-hidden="true">*</span>
                                </label>
                                <input type="date"
                                       id="date"
                                       name="date"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('date')} ? 'is-invalid'"
                                       th:value="${expense.date != null ? #temporals.format(expense.date, 'yyyy-MM-dd') : ''}">
                                <div class="invalid-feedback" th:errors="*{date}">Date error</div>
                            </div>

                        </div>

                        <!-- ▸ Category + Payment Method ───────────────── -->
                        <div class="row g-3 mb-4">

                            <div class="col-md-6">
                                <label class="form-label fw-semibold" for="category">
                                    Category <span class="text-danger" aria-hidden="true">*</span>
                                </label>
                                <select th:field="*{category}"
                                        class="form-select"
                                        th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                                    <option value="">— Select category —</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat}"
                                            th:text="${cat}">
                                    </option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{category}">Category error</div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold" for="paymentMethod">
                                    Payment Method <span class="text-danger" aria-hidden="true">*</span>
                                </label>
                                <select th:field="*{paymentMethod}"
                                        class="form-select"
                                        th:classappend="${#fields.hasErrors('paymentMethod')} ? 'is-invalid'">
                                    <option value="">— Select method —</option>
                                    <option th:each="pm : ${paymentMethods}"
                                            th:value="${pm}"
                                            th:text="${pm}">
                                    </option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{paymentMethod}">Payment error</div>
                            </div>

                        </div>

                        <!-- ▸ Description ─────────────────────────────── -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold" for="description">
                                Description
                                <span class="text-muted fw-normal small ms-1">(optional)</span>
                            </label>
                            <textarea th:field="*{description}"
                                      class="form-control"
                                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                      rows="3"
                                      maxlength="500"
                                      placeholder="Any notes about this expense…"></textarea>
                            <div class="invalid-feedback" th:errors="*{description}">Description error</div>
                            <div class="form-text text-end">
                                <span id="descCount">0</span> / 500
                            </div>
                        </div>

                        <!-- ▸ Action buttons ──────────────────────────── -->
                        <div class="d-flex align-items-center gap-3 pt-2 border-top">
                            <button type="submit" class="btn btn-primary px-5">
                                <i class="bi bi-check-lg me-2"></i>Save Expense
                            </button>
                            <a th:href="@{/expenses}" class="btn btn-link text-secondary text-decoration-none px-0">
                                <i class="bi bi-x-lg me-1"></i>Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>

            <!-- Required fields note -->
            <p class="text-muted small mt-2 ps-1">
                <span class="text-danger">*</span> Required fields
            </p>
        </div>
    </div>

</div>

<!-- ── Page-specific scripts ── -->
<th:block layout:fragment="scripts">
<script th:src="@{/js/expense-voice.js}"></script>
<script>
    /* Default date to today for new-expense forms */
    (function () {
        const dateInput = document.getElementById('date');
        if (dateInput && !dateInput.value) {
            dateInput.value = new Date().toISOString().split('T')[0];
        }
    }());

    /* Live character counter for description */
    (function () {
        const ta    = document.getElementById('description');
        const count = document.getElementById('descCount');
        if (!ta || !count) return;
        const update = () => { count.textContent = ta.value.length; };
        update();
        ta.addEventListener('input', update);
    }());

    /* ── Natural-language parse-with-AI ──────────────────────────────────── */
    (function () {
        const input   = document.getElementById('nlInput');
        const btn     = document.getElementById('nlParseBtn');
        const label   = document.getElementById('nlParseLabel');
        const spinner = document.getElementById('nlParseSpinner');
        const okBanner  = document.getElementById('nlSuccessBanner');
        const errBanner = document.getElementById('nlErrorBanner');
        if (!input || !btn) return; // edit page — section not rendered

        const form = document.querySelector('form[th\\:object], form');
        const $ = (name) => form.querySelector('[name="' + name + '"]');

        function setLoading(loading) {
            btn.disabled = loading;
            input.disabled = loading;
            label.classList.toggle('d-none',   loading);
            spinner.classList.toggle('d-none', !loading);
        }

        function showBanner(el, visible) {
            el.classList.toggle('d-none', !visible);
            el.classList.toggle('d-flex',  visible);
        }

        function fillForm(data) {
            if (data.title         != null) $('title').value         = data.title;
            if (data.amount        != null) $('amount').value        = data.amount;
            if (data.category      != null) $('category').value      = data.category;
            if (data.paymentMethod != null) $('paymentMethod').value = data.paymentMethod;
            if (data.date          != null) $('date').value          = data.date;
            if (data.description   != null) {
                $('description').value = data.description;
                $('description').dispatchEvent(new Event('input')); // refresh char counter
            }
        }

        async function parse() {
            const text = input.value.trim();
            if (!text) return;

            showBanner(okBanner,  false);
            showBanner(errBanner, false);
            setLoading(true);

            try {
                const body = new URLSearchParams({ input: text });
                const res  = await fetch('/expenses/parse-nl', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body:    body,
                });

                if (!res.ok) {
                    showBanner(errBanner, true);
                    return;
                }

                const data = await res.json();
                fillForm(data);
                showBanner(okBanner, true);

            } catch (e) {
                showBanner(errBanner, true);
            } finally {
                setLoading(false);
            }
        }

        btn.addEventListener('click', parse);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); parse(); }
        });
    }());
</script>
</th:block>

</body>
</html>
