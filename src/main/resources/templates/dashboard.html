<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Dashboard</title>
</head>
<body>
<div layout:fragment="content">

    <!-- ── Page header ── -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">Dashboard</h4>
            <small class="text-muted">Spending overview across all recorded expenses</small>
        </div>
        <a th:href="@{/expenses}" class="btn btn-outline-primary btn-sm d-inline-flex align-items-center gap-2">
            <i class="bi bi-table"></i>View All Expenses
        </a>
    </div>

    <!-- ── Charts row ── -->
    <div class="row g-4 mb-4">

        <!-- Doughnut: spending by category -->
        <div class="col-lg-5">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-transparent border-bottom py-3 px-4">
                    <span class="fw-semibold small d-flex align-items-center gap-2">
                        <i class="bi bi-pie-chart text-primary"></i>Spending by Category
                    </span>
                </div>
                <div class="card-body d-flex align-items-center justify-content-center p-4">
                    <!-- canvas is hidden and empty-state shown when there's no data (handled in JS) -->
                    <canvas id="categoryChart" style="max-height:300px;"></canvas>
                    <div id="categoryEmpty" class="text-center text-muted d-none py-4">
                        <i class="bi bi-inbox fs-1 d-block mb-2 opacity-25"></i>
                        <small>No expense data yet</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bar: monthly trend -->
        <div class="col-lg-7">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-transparent border-bottom py-3 px-4">
                    <span class="fw-semibold small d-flex align-items-center gap-2">
                        <i class="bi bi-bar-chart text-success"></i>Monthly Spending Trend
                        <span class="text-muted fw-normal">(last 6 months)</span>
                    </span>
                </div>
                <div class="card-body p-4">
                    <div style="position:relative; height:280px;">
                        <canvas id="monthChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <!-- /charts -->

    <!-- ── Top 5 table ── -->
    <div class="card shadow-sm">
        <div class="card-header bg-transparent border-bottom py-3 px-4">
            <span class="fw-semibold small d-flex align-items-center gap-2">
                <i class="bi bi-trophy text-warning"></i>Top 5 Most Expensive Transactions
            </span>
        </div>
        <div class="card-body p-0">

            <!-- Empty state -->
            <div th:if="${topExpenses.empty}" class="text-center py-5 text-muted">
                <i class="bi bi-inbox fs-1 d-block mb-3 opacity-25"></i>
                <p class="mb-0">No expenses recorded yet.</p>
            </div>

            <!-- Table -->
            <div class="table-responsive" th:if="${not topExpenses.empty}">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4" style="width:3rem;">#</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th class="text-end">Amount</th>
                        <th>Date</th>
                        <th class="text-end pe-4">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="expense, stat : ${topExpenses}">

                        <!-- Rank badge: gold for 1st, silver for 2nd, plain for rest -->
                        <td class="ps-4">
                            <span class="badge rounded-pill"
                                  th:classappend="${stat.index == 0} ? 'bg-warning text-dark'
                                               : (${stat.index == 1} ? 'bg-secondary'
                                               : 'bg-light text-dark border')"
                                  th:text="${stat.count}">1</span>
                        </td>

                        <td>
                            <span class="fw-medium" th:text="${expense.title}">Title</span>
                            <div th:if="${expense.description != null and !expense.description.isBlank()}"
                                 class="text-muted small text-truncate" style="max-width:220px;"
                                 th:text="${expense.description}"></div>
                        </td>

                        <td>
                            <span class="badge badge-cat"
                                  th:classappend="'badge-' + ${expense.category}"
                                  th:text="${expense.category}">CAT</span>
                        </td>

                        <td class="amount-cell text-end fw-bold"
                            th:text="'₹ ' + ${#numbers.formatDecimal(expense.amount, 1, 'COMMA', 2, 'POINT')}">
                            ₹ 0.00
                        </td>

                        <td class="text-nowrap"
                            th:text="${#temporals.format(expense.date, 'dd MMM yyyy')}">01 Jan 2024</td>

                        <td class="text-end pe-4">
                            <a th:href="@{/expenses/{id}/edit(id=${expense.id})}"
                               class="btn btn-sm btn-outline-primary" title="Edit">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
    <!-- /top 5 -->

</div>

<th:block layout:fragment="scripts">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <script th:inline="javascript">
    (function () {
        'use strict';

        /* ── Data from server ──────────────────────────────────────────────── */
        const categoryLabels = /*[[${categoryLabels}]]*/ [];
        const categoryValues = /*[[${categoryValues}]]*/ [];
        const monthLabels    = /*[[${monthLabels}]]*/ [];
        const monthValues    = /*[[${monthValues}]]*/ [];

        /* ── Category colour palette (mirrors badge CSS) ────────────────────── */
        const PALETTE = {
            FOOD:          '#198754',
            TRANSPORT:     '#0d6efd',
            ENTERTAINMENT: '#ffc107',
            HEALTH:        '#dc3545',
            UTILITIES:     '#6c757d',
            SHOPPING:      '#0dcaf0',
            EDUCATION:     '#212529',
            OTHER:         '#adb5bd',
        };
        const catColors = categoryLabels.map(l => PALETTE[l] || '#adb5bd');

        /* ── Global Chart.js defaults ───────────────────────────────────────── */
        Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";

        /* ── Doughnut: spending by category ────────────────────────────────── */
        if (categoryLabels.length === 0) {
            document.getElementById('categoryChart').classList.add('d-none');
            document.getElementById('categoryEmpty').classList.remove('d-none');
        } else {
            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: categoryLabels,
                    datasets: [{
                        data:            categoryValues,
                        backgroundColor: catColors,
                        borderWidth:     2,
                        borderColor:     '#ffffff',
                        hoverOffset:     8,
                    }]
                },
                options: {
                    responsive:          true,
                    maintainAspectRatio: true,
                    cutout:              '60%',
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                font:     { size: 12 },
                                padding:  14,
                                boxWidth: 14,
                                boxHeight: 14,
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    const val   = ctx.parsed;
                                    const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                    const pct   = total > 0 ? ((val / total) * 100).toFixed(1) : '0.0';
                                    return '  ₹' + val.toLocaleString('en-IN', { minimumFractionDigits: 2 })
                                           + '  (' + pct + '%)';
                                }
                            }
                        }
                    }
                }
            });
        }

        /* ── Bar: monthly spending trend ────────────────────────────────────── */
        new Chart(document.getElementById('monthChart'), {
            type: 'bar',
            data: {
                labels: monthLabels,
                datasets: [{
                    label:           'Total Spending',
                    data:            monthValues,
                    backgroundColor: 'rgba(13, 110, 253, 0.70)',
                    borderColor:     '#0d6efd',
                    borderWidth:     1,
                    borderRadius:    5,
                    borderSkipped:   false,
                }]
            },
            options: {
                responsive:          true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid:  { color: 'rgba(0,0,0,0.05)' },
                        ticks: {
                            font:     { size: 11 },
                            callback: v => '₹' + v.toLocaleString('en-IN')
                        }
                    },
                    x: {
                        grid:  { display: false },
                        ticks: { font: { size: 11 } }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => '  ₹' + ctx.parsed.y.toLocaleString('en-IN',
                                              { minimumFractionDigits: 2 })
                        }
                    }
                }
            }
        });

    })();
    </script>
</th:block>
</body>
</html>
