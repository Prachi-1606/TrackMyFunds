<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | TrackMyFunds">TrackMyFunds</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body { background-color: #f5f6fa; }

        /* ── Sidebar ── */
        .sidebar {
            min-height: calc(100vh - 56px);
            background: #ffffff;
            border-right: 1px solid #e9ecef;
            padding-top: 1rem;
        }
        .sidebar .nav-link {
            color: #6c757d;
            border-radius: .375rem;
            padding: .4rem .75rem;
            font-size: .875rem;
        }
        .sidebar .nav-link:hover  { background-color: #f0f4ff; color: #0d6efd; }
        .sidebar .nav-link.active { background-color: #e7edff; color: #0d6efd; font-weight: 500; }
        .sidebar .section-label {
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .08em;
            color: #adb5bd;
            text-transform: uppercase;
            padding: .5rem .75rem .25rem;
        }

        /* ── Summary stat cards ── */
        .stat-card { border: none; border-radius: .75rem; transition: transform .15s; }
        .stat-card:hover { transform: translateY(-2px); }

        /* ── Category badges ── */
        .badge-cat { font-size: .7rem; padding: .35em .6em; font-weight: 600; letter-spacing: .03em; }
        .badge-FOOD          { background-color: #198754 !important; color: #fff; }
        .badge-TRANSPORT     { background-color: #0d6efd !important; color: #fff; }
        .badge-ENTERTAINMENT { background-color: #ffc107 !important; color: #000; }
        .badge-HEALTH        { background-color: #dc3545 !important; color: #fff; }
        .badge-UTILITIES     { background-color: #6c757d !important; color: #fff; }
        .badge-SHOPPING      { background-color: #0dcaf0 !important; color: #000; }
        .badge-EDUCATION     { background-color: #212529 !important; color: #fff; }
        .badge-OTHER         { background-color: #adb5bd !important; color: #000; }

        /* ── Payment method badges ── */
        .badge-CASH       { background-color: #198754 !important; color: #fff; }
        .badge-CARD       { background-color: #0d6efd !important; color: #fff; }
        .badge-UPI        { background-color: #6f42c1 !important; color: #fff; }
        .badge-NETBANKING { background-color: #fd7e14 !important; color: #fff; }

        /* ── Table ── */
        .table th {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: #6c757d;
            font-weight: 600;
            white-space: nowrap;
        }
        .table td { vertical-align: middle; font-size: .875rem; }
        .amount-cell { font-variant-numeric: tabular-nums; font-weight: 500; }

        /* ── Filter card ── */
        .filter-card { border: 1px solid #dee2e6; border-radius: .75rem; background: #fff; }

        /* ── Misc ── */
        .sort-link { color: inherit; text-decoration: none; }
        .sort-link:hover { color: #0d6efd; }

        /* ── Active filter dropdown ── */
        select.tmf-filter-active {
            border-color: #0d6efd;
            background-color: #eef2ff;
            color: #0d6efd;
            font-weight: 500;
        }
    </style>

    <th:block layout:fragment="head-extra"></th:block>
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     Navbar
════════════════════════════════════════════════════════ -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold fs-5 d-flex align-items-center gap-2" th:href="@{/}">
            <i class="bi bi-wallet2"></i>TrackMyFunds
        </a>

        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-3 me-auto mb-2 mb-lg-0 gap-1">
                <li class="nav-item">
                    <a class="nav-link rounded px-3" th:href="@{/dashboard}">
                        <i class="bi bi-bar-chart-line me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link rounded px-3" th:href="@{/expenses}">
                        <i class="bi bi-table me-1"></i>Expenses
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link rounded px-3" th:href="@{/expenses/new}">
                        <i class="bi bi-plus-circle me-1"></i>Add Expense
                    </a>
                </li>
            </ul>
            <span class="navbar-text text-white text-opacity-75 small d-flex align-items-center gap-1">
                <i class="bi bi-calendar3"></i>
                <th:block th:text="${#temporals.format(#temporals.createNow(), 'dd MMM yyyy')}">Today</th:block>
            </span>
        </div>
    </div>
</nav>

<!-- ══════════════════════════════════════════════════════
     Body: sidebar + content
════════════════════════════════════════════════════════ -->
<div class="container-fluid px-0">
    <div class="row g-0">

        <!-- ── Sidebar (hidden below lg) ── -->
        <aside class="col-xxl-2 col-xl-2 col-lg-3 d-none d-lg-flex flex-column sidebar">

            <div class="section-label">Navigation</div>
            <ul class="nav flex-column px-2 gap-1">
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/dashboard}">
                        <i class="bi bi-bar-chart-line"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/expenses}">
                        <i class="bi bi-table"></i>All Expenses
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/expenses/new}">
                        <i class="bi bi-plus-lg"></i>New Expense
                    </a>
                </li>
            </ul>

            <hr class="mx-3 my-2">

            <div class="section-label">Quick Filters</div>
            <ul class="nav flex-column px-2 gap-1">
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/expenses(category='FOOD')}">
                        <i class="bi bi-cup-hot"></i>Food
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/expenses(category='TRANSPORT')}">
                        <i class="bi bi-car-front"></i>Transport
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/expenses(category='HEALTH')}">
                        <i class="bi bi-heart-pulse"></i>Health
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/expenses(category='SHOPPING')}">
                        <i class="bi bi-bag"></i>Shopping
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/expenses(category='ENTERTAINMENT')}">
                        <i class="bi bi-film"></i>Entertainment
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/expenses(category='UTILITIES')}">
                        <i class="bi bi-lightning"></i>Utilities
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/expenses(category='EDUCATION')}">
                        <i class="bi bi-book"></i>Education
                    </a>
                </li>
            </ul>
        </aside>

        <!-- ── Main content ── -->
        <main class="col-xxl-10 col-xl-10 col-lg-9 col-12 py-4 px-4">

            <!-- Flash message (set as flash attribute from controller) -->
            <div th:if="${successMessage}"
                 class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2 mb-4"
                 role="alert">
                <i class="bi bi-check-circle-fill flex-shrink-0"></i>
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Child template fills this block -->
            <div layout:fragment="content">
                <p class="text-muted">No content defined.</p>
            </div>

        </main>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/expenses.js}"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
