# ─── PostgreSQL Database (prod) ───────────────────────────────────────────────
# Activate with: --spring.profiles.active=prod
# All three variables must be set in the environment (see README.md)
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ─── H2 Console disabled in prod ──────────────────────────────────────────────
spring.h2.console.enabled=false

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# validate: Hibernate checks schema against entity mappings but never alters it.
# All DDL is owned by Flyway migrations.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ─── Flyway schema migrations ─────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true
