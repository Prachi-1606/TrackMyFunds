# ─── Application ──────────────────────────────────────────────────────────────
spring.application.name=TrackMyFunds
server.port=8080
spring.profiles.active=dev

# ─── H2 In-Memory Database (default / dev) ────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:trackmyfundsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── H2 Console ───────────────────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ─── Flyway ───────────────────────────────────────────────────────────────────
# Disabled by default; enabled only in application-prod.properties.
# Dev uses H2 with ddl-auto=create-drop; Flyway would conflict with that.
spring.flyway.enabled=false

# ─── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ─── Gemini AI ────────────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
