# ─── MySQL Database (prod) ────────────────────────────────────────────────────
# Activate with: --spring.profiles.active=prod
# Supply credentials via environment variables: DB_USERNAME, DB_PASSWORD
spring.datasource.url=jdbc:mysql://localhost:3306/trackmyfundsdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ─── H2 Console disabled in prod ──────────────────────────────────────────────
spring.h2.console.enabled=false

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true
